name: Pylint Code Quality Check

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pylint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Install project dependencies if requirements.txt exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install additional dependencies for robotics
        pip install numpy matplotlib scipy sympy ikpy
    
    - name: Analysing the code with pylint
      run: |
        # Run pylint on all Python files in the project
        # Exclude .venv and __pycache__ directories
        find . -type f -name "*.py" \
          -not -path "./.venv/*" \
          -not -path "./__pycache__/*" \
          -not -path "./*/__pycache__/*" \
          | xargs pylint --fail-under=7.0 --output-format=colorized
    
    - name: Upload pylint results
      if: always()
      run: |
        # Generate pylint report in JSON format for better analysis
        find . -type f -name "*.py" \
          -not -path "./.venv/*" \
          -not -path "./__pycache__/*" \
          -not -path "./*/__pycache__/*" \
          | xargs pylint --output-format=json > pylint-report.json || true
    
    - name: Upload pylint report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pylint-report-python-${{ matrix.python-version }}
        path: pylint-report.json